<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natalie Therapy | Get in Touch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Natalie</a>
            <a href="approach.html">How I Can Help</a>
            <a href="contact.html">Get in Touch</a>
        </nav>
    </header>

    <main>
        <h1>Get in Touch</h1>
        <p>I would love to hear from you. Please fill out the form below, and I will get back to you as soon as possible.</p>
        
        <form action="#" method="post" id="contact-form">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name" style="width: 100%; box-sizing: border-box;">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Your Email" style="width: 100%; box-sizing: border-box;">
            </div>
            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="How can I help you?" style="width: 100%; box-sizing: border-box;"></textarea>
            </div>
            <button type="submit" class="button">Send Message</button>
        </form>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Natalie Therapy. All rights reserved.</p>
            <p>Email: nataliegoh.therapy@gmail.com | Phone: (02) 1234 5678</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
